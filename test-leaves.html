<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Листья — Маджонг РИМА</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="js/header.js" defer></script>
    <style>
        .leaves-section {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: var(--main-black);
        }
    </style>
</head>
<body>

<!-- хедер -->
<div class="blk-bg-clr" id="header">
    <div class="header-content">
        <div class="logo">
            <img src="img/logo-png/Logo-Rima-Main.png" class="logo-rima-header">
        </div>
        <nav class="header-nav">
            <a href="#">в культуре</a>
            <a href="#">клубы</a>
            <a href="#">правила</a>
            <a href="#">история</a>
            <a href="#">главная</a>
        </nav>
    </div>
</div>

<!-- Секция с листьями -->
<div class="leaves-section" id="leaves-section"></div>

<!-- футер -->
<div class="block-container blk-bg-clr" id="footer">
    <div class="padding-block-container block-horizontal-align">
        <div class="block-container" style="width: auto;">
            <img src="img/logo-png/Logo-Rima-Main.png" class="logo-rima">
        </div>
        <div class="block-container">
            <div><img src="img/logo-png/VH-logo-gray.png" class="logo-vhutein"></div>
        </div>
        <div class="block-container" style="width: 27%;">
            <img src="img/logo-svg/vk-white.svg" class="s-media-icons">
            <img src="img/logo-svg/tg-white.svg" class="s-media-icons">
        </div>
    </div>
</div>

<script src="js/leaves.js"></script>
</body>
</html>
